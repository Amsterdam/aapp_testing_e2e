appId: nl.amsterdam.app.dev
---
- tapOn:
    id: AddressStreetInputSearchField
- inputText: ${ADDRESS}
- extendedWaitUntil:
    visible:
      id: '^AddressSearchResult.*ButtonText$'
      text: ${ADDRESS}

- tapOn:
    id: '^AddressSearchResult.*ButtonText$'
    text: ${ADDRESS}

- waitForAnimationToEnd
