appId: nl.amsterdam.app.dev
---
- runFlow:
    file: ../shared/OpenModuleFromFreshApp.yaml
    env:
      ENVIRONMENT: Acceptance
      MODULE: HomeWasteGuideModuleButton
- tapOn:
    id: WasteGuideAddressSwitch
- runFlow:
    label: Enter address
    file: '../shared/EnterAddress.yaml'
    env:
      ADDRESS: Cruquiusweg 5
      BAGID: '0363200000406068'
      ID: WasteGuide
      SAVEASMYADDRESS: Yes

- scrollUntilVisible:
    element:
      id: WasteGuideNotificationSwitchSwitch
- tapOn:
    text: '.* staat uit'
    id: WasteGuideNotificationSwitchSwitch
- waitForAnimationToEnd
- tapOn:
    text: '.* staat aan'
    id: WasteGuideNotificationSwitchSwitch
- waitForAnimationToEnd
- assertVisible:
    text: '.* staat uit'
    id: WasteGuideNotificationSwitchSwitch
