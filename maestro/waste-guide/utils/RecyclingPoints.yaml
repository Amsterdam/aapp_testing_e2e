appId: nl.amsterdam.app.dev
---
- scrollUntilVisible:
    element:
      id: WasteGuideRecyclingButton
- tapOn:
    id: WasteGuideRecyclingButton
- assertVisible:
    text: Nieuw-West, Henk Sneevlietweg 22 1066 VH Amsterdam
    id: RecyclePointTopTaskButton
- assertVisible:
    text: Maandag, dinsdag, woensdag, donderdag, vrijdag en zaterdag van 08.00 tot 17.00 uur
    id: WasteGuideRecyclePointsVisitingHoursList0ItemText
- assertVisible:
    text: Zondag van 10.00 tot 16.00 uur
    id: WasteGuideRecyclePointsVisitingHoursList1ItemText
- tapOn:
    id: WasteGuideRecyclePointsSeeMapButton
- assertVisible:
    text: Henk Sneevlietweg
    id: HeaderTitle
- extendedWaitUntil:
    visible:
      text: Henk Sneevlietweg. Henk Sneevlietweg.?
    timeout: 30000
- assertVisible:
    text: Henk Sneevlietweg. Henk Sneevlietweg.?
- assertVisible:
    id: WasteGuideRecyclePointMapExternalLinkButton
- tapOn:
    id: HeaderBackIcon
- tapOn:
    id: RecyclePointTopTaskButton
- tapOn:
    id: RecyclePoint2Button
- assertVisible:
    text: Oost, Rozenburglaan 1 1097 HK Amsterdam
    id: RecyclePointTopTaskButton
- assertVisible:
    text: Maandag, dinsdag, woensdag, donderdag, vrijdag en zaterdag van 08.00 tot 17.00 uur
    id: WasteGuideRecyclePointsVisitingHoursList0ItemText
- assertNotVisible:
    id: WasteGuideRecyclePointsVisitingHoursList1ItemText
- tapOn:
    id: WasteGuideRecyclePointsSeeMapButton
- assertVisible:
    text: Rozenburglaan
    id: HeaderTitle
- extendedWaitUntil:
    visible:
      text: Rozenburglaan. Rozenburglaan.?
    timeout: 30000
- assertVisible:
    text: Rozenburglaan. Rozenburglaan.?
- assertVisible:
    id: WasteGuideRecyclePointMapExternalLinkButton
- tapOn:
    id: HeaderBackIcon
- tapOn:
    id: HeaderBackIcon
