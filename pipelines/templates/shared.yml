parameters:
  - name: appId
    type: string
    default: ''
  - name: testSuiteId
    type: string
    default: ''
  - name: buildArtifact
    type: string
    default: ''
  - name: appFileName
    type: string
    default: ''
  - name: platform
    type: string
    default: 'not-found'
  - name: device
    type: string
    default: ''
  - name: buildApiUrl
    type: string
    default: ''

steps:
  # Rename credentials.ci.js to credentials.js before variable injection
  - script: |
      find maestro -type f -name 'credentials.ci.js' -exec sh -c 'mv "$0" "${0%/*}/credentials.js"' {} \;
    displayName: 'Rename credentials.ci.js to credentials.js'

  # Inject Azure DevOps variable(s) into Maestro YAMLs before zipping
  - script: |
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_VISITOR_PERMIT_HOLDER_REPORT_CODE__|$(PARKING_VISITOR_PERMIT_HOLDER_REPORT_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_VISITOR_PERMIT_HOLDER_PIN_CODE__|$(PARKING_VISITOR_PERMIT_HOLDER_PIN_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_VISITOR_REPORT_CODE__|$(PARKING_VISITOR_REPORT_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_VISITOR_PIN_CODE__|$(PARKING_VISITOR_PIN_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_INFORMAL_CARE_REPORT_CODE__|$(PARKING_INFORMAL_CARE_REPORT_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_INFORMAL_CARE_PIN_CODE__|$(PARKING_INFORMAL_CARE_PIN_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_BUSINESS_REPORT_CODE__|$(PARKING_BUSINESS_REPORT_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_BUSINESS_PIN_CODE__|$(PARKING_BUSINESS_PIN_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_RESIDENTS_REPORT_CODE__|$(PARKING_RESIDENTS_REPORT_CODE)|g' {} +
      find maestro -type f -name 'credentials.js' -exec sed -i '' 's|__PARKING_RESIDENTS_PIN_CODE__|$(PARKING_RESIDENTS_PIN_CODE)|g' {} +
    displayName: 'Inject parking account variables into Maestro tests'
  # Archive Maestro tests
  - task: ArchiveFiles@2
    condition: ${{ eq(parameters.testSuiteId, ' ') }}
    inputs:
      rootFolderOrFile: 'maestro'
      includeRootFolder: true
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/maestro-tests.zip'
      replaceExistingArchive: true
    displayName: 'Create ZIP-file of Maestro tests'

  # Publish Maestro tests artifact
  - task: PublishBuildArtifacts@1
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)/maestro-tests.zip'
      artifactName: 'maestro-tests'
      publishLocation: 'Container'
    displayName: 'Publish Maestro Tests Artifact'

  # Download app build files
  - download: build
    condition: ${{ eq(parameters.appId, ' ') }}
    artifact: ${{ parameters.buildArtifact }}
    displayName: 'Download app build files'

  # Create BrowserStack Auth Hash
  - powershell: |
      $authString = "$(BROWSERSTACK_USERNAME):$(BROWSERSTACK_ACCESS_KEY)"
      $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes($authString))
      Write-Host "##vso[task.setvariable variable=AUTH_HASH;issecret=true]$auth"
    displayName: 'Create BrowserStack Auth Hash'

  # Upload Maestro tests to BrowserStack
  - powershell: |
      if ("${{ parameters.testSuiteId }}" -ne " ") {
          Write-Host "testSuiteId is pre-filled: ${{ parameters.testSuiteId }}"
          Write-Host "##vso[task.setvariable variable=testSuiteId]${{ parameters.testSuiteId }}"
          exit 0
      }
      $headers = @{
          Authorization = "Basic $(AUTH_HASH)"
      }
      $form = @{
          file = Get-Item "$(Build.ArtifactStagingDirectory)/maestro-tests.zip"
      }
      $testSuiteResponse = Invoke-RestMethod -Uri "https://api-cloud.browserstack.com/app-automate/maestro/v2/test-suite" `
          -Method POST `
          -Headers $headers `
          -Form $form
      Write-Host "Test Suite ID: $($testSuiteResponse.test_suite_id)"
      Write-Host "##vso[task.setvariable variable=testSuiteId]$($testSuiteResponse.test_suite_id)"
    displayName: 'Upload Maestro tests to BrowserStack'

  # Upload App to BrowserStack
  - powershell: |
      if ("${{ parameters.appId }}" -ne " ") {
          Write-Host "appId is pre-filled: ${{ parameters.appId }}"
          Write-Host "##vso[task.setvariable variable=appId]${{ parameters.appId }}"
          exit 0
      }
      $appFile = Get-ChildItem "$(Pipeline.Workspace)/build/${{ parameters.buildArtifact }}/${{ parameters.appFileName }}" | Select-Object -First 1
      if (-not $appFile) {
          Write-Host "##vso[task.logissue type=error]No ${{ parameters.appFileName }} file found"
          exit 1
      }
      $headers = @{
          Authorization = "Basic $(AUTH_HASH)"
      }
      $form = @{
          custom_id = "AmsterdamAppTest-${{ parameters.platform }}"
          file = Get-Item "$(Pipeline.Workspace)/build/${{ parameters.buildArtifact }}/${{ parameters.appFileName }}"
      }
      $appResponse = Invoke-RestMethod -Uri "https://api-cloud.browserstack.com/app-automate/maestro/v2/app" `
          -Method POST `
          -Headers $headers `
          -Form $form
      Write-Host "App ID: $($appResponse.app_id)"
      Write-Host "##vso[task.setvariable variable=appId]$($appResponse.app_id)"
    displayName: 'Upload App to BrowserStack'

  # Run Maestro Tests on BrowserStack
  - script: |
      # Find all .entry.yaml and .entry.<platform>.yaml files in maestro directory
      entry_files=$(find maestro -type f \( -name '*.entry.yaml' -o -name "*.entry.${{ parameters.platform }}.yaml" \) | sort | sed 's|^maestro/||')

      # Split into chunks of 20 files and run a BrowserStack build per chunk
      if [ -z "$entry_files" ]; then
        echo "##vso[task.logissue type=error]No Maestro entry files found."
        exit 1
      fi

      build_ids=()
      chunk_size=20
      tmp_dir="$(mktemp -d)"
      trap 'rm -rf "$tmp_dir"' EXIT
      printf '%s\n' "$entry_files" | split -l "$chunk_size" - "$tmp_dir/chunk_"

      for chunk_file in "$tmp_dir"/chunk_*; do
        buildBody=$(jq -n \
          --arg app "bs://$(appId)" \
          --arg testSuite "bs://$(testSuiteId)" \
          --arg project "Amsterdam App Maestro Tests" \
          --arg device "${{ parameters.device }}" \
          --argjson execute "$execute_json" \
          '{
            app: $app,
            testSuite: $testSuite,
            project: $project,
            devices: [$device],
            networkLogs: false,
            deviceLogs: true,
            execute: $execute,
            maestroVersion: "latest"
          }')

        response=$(curl -s -X POST "${{ parameters.buildApiUrl }}" \
          -H "Authorization: Basic $(AUTH_HASH)" \
          -H "Content-Type: application/json" \
          -d "$buildBody")

        build_id=$(echo "$response" | jq -r '.build_id // empty')
        if [ -z "$build_id" ]; then
          echo "Error: build_id is empty in BrowserStack API response."
          echo "API response: $response"
          echo "##vso[task.logissue type=error]Failed to retrieve build_id from BrowserStack API response."
          exit 1
        fi

        echo "Build ID: $build_id"
        build_ids+=("$build_id")
      done

      # Join all build IDs as comma-separated and export
      build_ids_joined=$(IFS=,; echo "${build_ids[*]}")
      echo "All Build IDs: $build_ids_joined"
      echo "##vso[task.setvariable variable=BUILD_ID]$build_ids_joined"
    displayName: 'Run Maestro Tests on BrowserStack'

  # Wait for BrowserStack Build and Show Result
  - powershell: |
      $buildIds = "$(BUILD_ID)".Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ }
      $headers = @{
          Authorization = "Basic $(AUTH_HASH)"
      }
      $maxAttempts = 60
      $waitSeconds = 30

      if (-not $buildIds) {
          Write-Host "##vso[task.logissue type=error]BUILD_ID is empty."
          exit 1
      }

      foreach ($buildId in $buildIds) {
          $url = "https://api-cloud.browserstack.com/app-automate/maestro/v2/builds/$buildId"
          Write-Host "Build status URL: $url"
          Write-Host "View progress in BrowserStack: https://app-automate.browserstack.com/dashboard/v2/builds/$buildId"

          $status = "running"
          $attempt = 0
          Write-Host "Polling BrowserStack build status for build ID: $buildId"

          while ($status -eq "running" -and $attempt -lt $maxAttempts) {
              $response = Invoke-RestMethod -Uri $url -Headers $headers
              $status = $response.status
              Write-Host "Attempt $($attempt + 1) for build ${buildId}: Status = $status"
              if ($status -eq "running") {
                  Start-Sleep -Seconds $waitSeconds
                  $attempt++
              }
          }

          if ($status -eq "running") {
              Write-Host "##vso[task.logissue type=error]Timed out waiting for build $buildId to finish."
              exit 1
          }

          Write-Host "Final build status for ${buildId}: $status"
          Write-Host "View build result in BrowserStack: https://app-automate.browserstack.com/dashboard/v2/builds/$buildId"
          Write-Host "Full response:"
          $response | ConvertTo-Json -Depth 10
          if ($status -ne "passed") {
              Write-Host "##vso[task.logissue type=error]Build $buildId did not pass. Status: $status"
              exit 1
          }
      }
    displayName: 'Wait for BrowserStack Build and Show Result'